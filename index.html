<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Money Pro - সাপোর্ট</title>
    <style>
        body {
            font-family: 'Hind Siliguri', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        .support-card {
            background: white;
            border-radius: 25px;
            padding: 40px 30px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            text-align: center;
        }
        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 20px;
        }
        p {
            color: #666;
            font-size: 18px;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .telegram-btn {
            background: linear-gradient(135deg, #0088cc, #0077b5);
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: transform 0.3s;
        }
        .telegram-btn:hover {
            transform: translateY(-3px);
        }
        .icon {
            font-size: 24px;
        }
    </style>
</head>
<body>
    <div class="support-card">
        <h1>🆘 সাপোর্ট সেন্টার</h1>
        <p>যেকোনো প্রয়োজনে আমাদের টেলিগ্রাম সাপোর্টে মেসেজ করুন। আমরা ২৪/৭ সাপোর্ট দিতে প্রস্তুত।</p>
        <a href="https://t.me/smartmoneypro_support" class="telegram-btn" target="_blank">
            <span class="icon">📱</span>
            টেলিগ্রামে মেসেজ করুন
        </a>
    </div>
</body>
</html>
